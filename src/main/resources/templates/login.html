<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ToDo Rails</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="wrapper">

    <div class="header">
        <div class="logo-section">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#0D9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
                <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                <rect x="9" y="3" width="6" height="4" rx="1"/>
                <path d="M9 14l2 2 4-4"/>
            </svg>
            <div class="text-section">
                <h1>ToDo Rails</h1>
                <p>Keep Your Goals on Track</p>
            </div>
        </div>
        <div class="auth-links">
            <a th:href="@{/}">Home</a>
        </div>
    </div>

    <div class="container login-container">
        <h2 style="margin:0 0 24px;color:var(--color-primary);font-size:22px;font-weight:700;text-align:center;">Login</h2>
        <div th:if="${successMessage}" class="flash-alert flash-alert-success">
            <p th:text="${successMessage}"></p>
        </div>
        <div th:if="${param.error}" class="flash-alert flash-alert-danger">
            <p>Invalid username or password. Please try again.</p>
        </div>

        <form action="/login" method="post">
            <label for="username">Username or Email:</label>
            <input type="text" id="username" name="username" placeholder="Enter your username or email" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>

            <button type="submit" class="btn btn-login">Continue</button>
        </form>
        <p style="text-align:center;margin-top:16px;font-size:14px;color:var(--color-text-muted);">Don't have an account? <a th:href="@{/register}" style="color:var(--color-primary);font-weight:600;">Register</a></p>
    </div>

    <!-- Include the footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
</body>
</html>
