<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard :: ToDo Rails</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/changepasswd.css}">
</head>
<body>
<div class="wrapper">

    <!-- Include the Sidebar Menu -->
    <div th:replace="~{fragments/menu :: menu}"></div>

    <div class="header" th:fragment="header">
        <div class="logo-section">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0D9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
                <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                <rect x="9" y="3" width="6" height="4" rx="1"/>
                <path d="M9 14l2 2 4-4"/>
            </svg>
            <div class="text-section">
                <h1>ToDo Rails</h1>
                <p>Keep Your Goals on Track</p>
            </div>
            <div class="heading-section">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                Change Password
            </div>
        </div>
        <div class="auth-links">
            <a th:href="@{/logout}">Logout</a>
        </div>
    </div>

    <!-- Main Content for Login Page -->
    <div class="container">
        <h2>Change Password</h2>

        <div id="error-messages-client" class="client-alert flash-alert-danger" style="display: none;">
            <h2 class="error-heading">Please correct the following errors:</h2>
            <ul id="error-list"></ul>
        </div>

        <form action="/changepasswd" method="post" class="password-form" onsubmit="return validateChangePasswordForm()">
            <!-- Current Password Field -->
            <label for="currentPassword">Enter current password</label>
            <input type="password" id="currentPassword" name="currentPassword" placeholder="Enter current password" >

            <!-- New Password Field -->
            <label for="newPassword">Enter new password</label>


            <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" >

            <!-- Confirm New Password Field -->
            <label for="confirmPassword">Confirm new password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter new password">

            <!-- Button Group for Continue and Cancel -->
            <div class="button-group">
                <button type="submit" class="btn btn-continue">Continue</button>
                <button type="button" id="btn-cancel" class="btn btn-cancel" onclick="window.location='/dashboard'">Cancel</button>
            </div>
        </form>
    </div>


    <!-- Include the footer (same as index.html) -->
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
<script th:src="@{/js/menu.js}"></script>
<script th:src="@{/js/changepasswd.js}"></script>
</body>
</html>
